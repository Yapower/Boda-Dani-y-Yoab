<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniela & Yoab</title>
  <link rel="stylesheet" href="style1.css">
</head>

<div class="flowers-upper">
    <img src="flores superiores.png" alt="Flores inferiores" class="flowers-img">
  </div>
<body>

<div class="wrapper">
  <div class="contenedor">

    <img src="set.png" class="imagen-base">

    <img src="hora.png" class="flotante hora" id="hora">
    <img src="detalles.png" class="flotante detalles" id="detalles">
    <img src="fotos.png" class="flotante fotos" id="fotos">
    <img src="ubicacion.png" class="flotante ubicacion" id="ubicacion">

    <!-- Cuenta regresiva -->
    <div id="contador" class="cuenta-regresiva">
      <p class="texto-cuenta">Cuenta regresiva para el día más especial de nuestra vida</p>
      <div class="tiempos">
        <div class="tiempo">
          <span id="dias">0</span>
          <span class="label">Días</span>
        </div>
        <div class="tiempo">
          <span id="horas">0</span>
          <span class="label">Horas</span>
        </div>
        <div class="tiempo">
          <span id="minutos">0</span>
          <span class="label">Minutos</span>
        </div>
        <div class="tiempo">
          <span id="segundos">0</span>
          <span class="label">Segundos</span>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="modalConfirmacion" class="modal">

  <div class="modal-contenido">

    <span class="cerrar" id="cerrarModal">&times;</span>

    <h2>Confirmar asistencia</h2>

    <input type="text" id="buscarNombre" placeholder="Escribe tu nombre">

    <button id="buscarBtn">Buscar</button>

    <div id="resultado"></div>

  </div>

</div>
<script src="script.js"></script>
</body>
</html>
